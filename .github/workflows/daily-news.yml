name: 每日科技新闻

on:
  # Cloudflare Worker 定时触发（北京时间 08:00）
  repository_dispatch:
    types: [daily-tech-news]

  # 支持手动触发
  workflow_dispatch:
    inputs:
      dry_run:
        description: '试运行（生成内容但不发布到微信）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    # 添加超时限制（30分钟）
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python3 -m pip install --upgrade pip
          pip install requests urllib3 zhdate certifi anthropic

      - name: 生成并发布新闻
        env:
          WECHAT_API_KEY: ${{ secrets.WECHAT_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          set -euo pipefail
          cd scripts

          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "错误：未设置 ANTHROPIC_API_KEY"
            exit 1
          fi

          # 设置 dry-run 标志（在循环外，只判断一次）
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "⚠️ 试运行模式，不发布到微信"
          fi

          # 运行脚本，带重试机制
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "尝试 $((RETRY_COUNT + 1))/$MAX_RETRIES..."

            if python3 auto_daily_news.py $DRY_RUN_FLAG 2>&1; then
              echo "✅ 新闻发布成功！"
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⚠️ 失败，等待 30 秒后重试..."
                sleep 30
              fi
            fi
          done

          echo "::error::所有重试都失败了"
          exit 1

      - name: 记录日志
        if: always()
        run: |
          echo "任务执行时间: $(date)"
          echo ""
          echo "=== 生成的新闻标题 ==="
          for f in raw_news_*.json; do
            [ -f "$f" ] && jq -r '.categorized_news | to_entries[] | "[\(.key)]", (.value[] | "  \(env.num // "")- \(.title // .original_title // "(无标题)")"), ""' "$f" && break
          done || echo "(无生成文件)"

      - name: 上传生成结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-output-${{ github.run_id }}
          path: |
            raw_news_*.json
            news_*.md
            logs/
          if-no-files-found: warn
